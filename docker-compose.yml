services:
  rust-sense:
    image: ghcr.io/rust-sense/bot:unstable
    container_name: rust-sense-bot
    environment:
      - RPP_DISCORD_TOKEN=TOKEN
      - RPP_DISCORD_CLIENT_ID=CLIENT_ID
    volumes:
      - ./logs:/app/logs
      - ./instances:/app/instances
      - ./credentials:/app/credentials
      - ./maps:/app/maps
      - ./authtokens:/app/authtokens
    restart: unless-stopped
