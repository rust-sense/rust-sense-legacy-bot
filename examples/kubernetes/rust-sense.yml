---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rust-sense-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rust-sense-config
data:
  discord.username: Rust
  discord.client_id: <discord app client_id>
---
apiVersion: v1
kind: Secret
metadata:
  name: rust-sense-secrets
type: Opaque
data:
  discord.token: <discord app token in base64>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rust-sense
    image: rust-sense
  name: rust-sense
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: rust-sense
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: rust-sense
        image: rust-sense
    spec:
      containers:
        - env:
            - name: RPP_DISCORD_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: rust-sense-config
                  key: discord.username
            - name: RPP_DISCORD_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: rust-sense-config
                  key: discord.client_id
            - name: RPP_DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rust-sense-secrets
                  key: discord.token
          image: ghcr.io/rust-sense/bot
          imagePullPolicy: Always
          name: rust-sense
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /app/credentials
              name: rust-sense-data
              subPath: credentials
            - mountPath: /app/instances
              name: rust-sense-data
              subPath: instances
            - mountPath: /app/logs
              name: rust-sense-data
              subPath: logs
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - name: rust-sense-data
          persistentVolumeClaim:
            claimName: rust-sense-data
---
