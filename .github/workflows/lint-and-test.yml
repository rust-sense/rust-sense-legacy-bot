name: Lint and test

on:
    push:
    pull_request:

jobs:
    lint:
        name: Lint - Node ${{ matrix.node }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node: [20, 21, 22]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: 'npm'
            - run: npm install
            - run: npm test
