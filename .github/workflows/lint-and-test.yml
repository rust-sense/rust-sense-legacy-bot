name: Lint and test

on:
    push:
    pull_request:

jobs:
    lint:
        name: Lint - Node ${{ matrix.node }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node: [20, 21, 22]
        steps:
            - uses: actions/checkout@v4
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: "pnpm"
            - run: pnpm install
            - run: pnpm test
