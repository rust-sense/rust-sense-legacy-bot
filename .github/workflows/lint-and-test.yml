name: Build and code quality

on:
    push:
    pull_request:

jobs:
    build:
        name: Build for ${{ matrix.node }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node: [20, 21, 22]
        steps:
            - uses: actions/checkout@v6
            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 9
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node }}
                  cache: "pnpm"
            - run: pnpm install
            - run: pnpm test
    quality:
        name: Code Quality
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Biome
              uses: biomejs/setup-biome@v2
              with:
                  version: "2.4.13"
            - name: Run Biome
              run: biome ci .
